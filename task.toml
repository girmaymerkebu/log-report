artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small access log and emit summary stats."
solution_explanation = "Read the log, count total requests and unique client IPs, and find the most-requested path."
verification_explanation = "Parse /app/report.json and assert the exact expected values (total_requests, unique_ips, top_path) computed from the fixed /app/access.log, plus exact-key and type checks. Reward is written to /logs/verifier/reward.txt and per-test results to /logs/verifier/ctrf.json."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
