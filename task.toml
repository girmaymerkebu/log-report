artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."


[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["generated_output_artifact"]
difficulty_explanation = "Parse a small access log and emit summary stats."
solution_explanation = "Read the log, count requests and unique client IPs, and find the most-requested path."
verification_explanation = "Parse /app/report.json and assert the exact computed values (total_requests, unique_ips, top_path) against the known contents of /app/access.log, plus key and type checks."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

